syntax = "proto3";

package post.v1;

option go_package = "github.com/bekesh/social/gen/go/post/v1;postv1";

// PostService — 14 RPCs: posts (7), likes (4), comments (3).
service PostService {
  // Post CRUD + feed
  rpc CreatePost(CreatePostRequest)       returns (CreatePostResponse);
  rpc GetPost(GetPostRequest)             returns (GetPostResponse);
  rpc UpdatePost(UpdatePostRequest)       returns (UpdatePostResponse);
  rpc DeletePost(DeletePostRequest)       returns (DeletePostResponse);
  rpc ListUserPosts(ListUserPostsRequest) returns (ListUserPostsResponse);
  rpc GetFeed(GetFeedRequest)             returns (GetFeedResponse);
  rpc SearchPosts(SearchPostsRequest)     returns (SearchPostsResponse);

  // Likes
  rpc LikePost(LikePostRequest)       returns (LikePostResponse);
  rpc UnlikePost(UnlikePostRequest)   returns (UnlikePostResponse);
  rpc IsLiked(IsLikedRequest)         returns (IsLikedResponse);
  rpc ListLikers(ListLikersRequest)   returns (ListLikersResponse);

  // Comments
  rpc AddComment(AddCommentRequest)       returns (AddCommentResponse);
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
  rpc ListComments(ListCommentsRequest)   returns (ListCommentsResponse);

  // Saves
  rpc SavePost(SavePostRequest)         returns (SavePostResponse);
  rpc UnsavePost(UnsavePostRequest)     returns (UnsavePostResponse);
  rpc GetSavedPosts(GetSavedPostsRequest) returns (GetSavedPostsResponse);
  rpc IsSaved(IsSavedRequest)           returns (IsSavedResponse);
}

// ── Common messages ────────────────────────────────────────────────────────

message PostProto {
  string          id             = 1;
  string          author_id      = 2;
  string          caption        = 3;
  repeated string media_urls     = 4;
  repeated string tags           = 5;
  int32           likes_count    = 6;
  int32           comments_count = 7;
  int64           created_at     = 8;
  int64           updated_at     = 9;
}

message CommentProto {
  string id        = 1;
  string post_id   = 2;
  string author_id = 3;
  string body      = 4;
  int64  created_at = 5;
}

// ── Post RPCs ──────────────────────────────────────────────────────────────

message CreatePostRequest {
  string          author_id  = 1;
  string          caption    = 2;
  repeated string media_urls = 3;
  repeated string tags       = 4;
}
message CreatePostResponse { PostProto post = 1; }

message GetPostRequest  { string id = 1; }
message GetPostResponse { PostProto post = 1; }

message UpdatePostRequest {
  string          id        = 1;
  string          author_id = 2;
  string          caption   = 3;
  repeated string tags      = 4;
}
message UpdatePostResponse { PostProto post = 1; }

message DeletePostRequest  { string id = 1; string author_id = 2; }
message DeletePostResponse {}

message ListUserPostsRequest {
  string author_id = 1;
  int32  limit     = 2;
  int32  offset    = 3;
}
message ListUserPostsResponse { repeated PostProto posts = 1; }

message GetFeedRequest {
  repeated string following_ids = 1;
  int32           limit         = 2;
  int32           offset        = 3;
}
message GetFeedResponse { repeated PostProto posts = 1; }

message SearchPostsRequest {
  string query  = 1;
  int32  limit  = 2;
  int32  offset = 3;
}
message SearchPostsResponse { repeated PostProto posts = 1; }

// ── Like RPCs ──────────────────────────────────────────────────────────────

message LikePostRequest  { string post_id = 1; string user_id = 2; }
message LikePostResponse {}

message UnlikePostRequest  { string post_id = 1; string user_id = 2; }
message UnlikePostResponse {}

message IsLikedRequest  { string post_id = 1; string user_id = 2; }
message IsLikedResponse { bool is_liked = 1; }

message ListLikersRequest {
  string post_id = 1;
  int32  limit   = 2;
  int32  offset  = 3;
}
message ListLikersResponse { repeated string user_ids = 1; }

// ── Save RPCs ──────────────────────────────────────────────────────────────

message SavePostRequest   { string post_id = 1; string user_id = 2; }
message SavePostResponse  {}

message UnsavePostRequest  { string post_id = 1; string user_id = 2; }
message UnsavePostResponse {}

message GetSavedPostsRequest {
  string user_id = 1;
  int32  limit   = 2;
  int32  offset  = 3;
}
message GetSavedPostsResponse { repeated PostProto posts = 1; }

message IsSavedRequest  { string post_id = 1; string user_id = 2; }
message IsSavedResponse { bool is_saved = 1; }

// ── Comment RPCs ───────────────────────────────────────────────────────────

message AddCommentRequest {
  string post_id   = 1;
  string author_id = 2;
  string body      = 3;
}
message AddCommentResponse { CommentProto comment = 1; }

message DeleteCommentRequest  { string comment_id = 1; string requester_id = 2; }
message DeleteCommentResponse {}

message ListCommentsRequest {
  string post_id = 1;
  int32  limit   = 2;
  int32  offset  = 3;
}
message ListCommentsResponse { repeated CommentProto comments = 1; }
