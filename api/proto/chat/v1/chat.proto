syntax = "proto3";

package chat.v1;

option go_package = "github.com/bekesh/social/gen/go/chat/v1;chatv1";

// ChatService — direct + group conversations, messages, streaming. 20 RPCs.
service ChatService {
  // Conversations (5)
  rpc CreateConversation(CreateConversationRequest)   returns (CreateConversationResponse);
  rpc GetConversation(GetConversationRequest)         returns (GetConversationResponse);
  rpc ListConversations(ListConversationsRequest)     returns (ListConversationsResponse);
  rpc DeleteConversation(DeleteConversationRequest)   returns (DeleteConversationResponse);
  rpc MarkConversationRead(MarkConvReadRequest)       returns (MarkConvReadResponse);

  // Messages (6)
  rpc SendMessage(SendMessageRequest)                 returns (SendMessageResponse);
  rpc EditMessage(EditMessageRequest)                 returns (EditMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest)             returns (DeleteMessageResponse);
  rpc ListMessages(ListMessagesRequest)               returns (ListMessagesResponse);
  rpc SearchMessages(SearchMessagesRequest)           returns (SearchMessagesResponse);
  rpc PinMessage(PinMessageRequest)                   returns (PinMessageResponse);

  // Reactions (2)
  rpc AddReaction(AddReactionRequest)                 returns (AddReactionResponse);
  rpc RemoveReaction(RemoveReactionRequest)           returns (RemoveReactionResponse);

  // Groups (5)
  rpc CreateGroupChat(CreateGroupChatRequest)         returns (CreateGroupChatResponse);
  rpc AddParticipant(AddParticipantRequest)           returns (AddParticipantResponse);
  rpc RemoveParticipant(RemoveParticipantRequest)     returns (RemoveParticipantResponse);
  rpc LeaveGroup(LeaveGroupRequest)                   returns (LeaveGroupResponse);
  rpc UpdateGroupInfo(UpdateGroupInfoRequest)         returns (UpdateGroupInfoResponse);

  // Streaming (2)
  rpc SubscribeMessages(SubscribeRequest)             returns (stream MessageEvent);
  rpc TypingIndicator(stream TypingEvent)             returns (stream TypingEvent);
}

// ── Common messages ────────────────────────────────────────────────────────

message ConversationProto {
  string id             = 1;
  string type           = 2;
  string name           = 3;
  string avatar_url     = 4;
  string created_by     = 5;
  int64  last_message_at = 6;
  int64  created_at     = 7;
}

message MessageProto {
  string id              = 1;
  string conversation_id = 2;
  string sender_id       = 3;
  string reply_to_id     = 4;
  string text            = 5;
  string media_url       = 6;
  bool   is_pinned       = 7;
  int64  edited_at       = 8;
  int64  created_at      = 9;
}

// ── Conversation RPCs ──────────────────────────────────────────────────────

message CreateConversationRequest {
  string          creator_id = 1;
  repeated string member_ids = 2;
}
message CreateConversationResponse { ConversationProto conversation = 1; }

message GetConversationRequest {
  string conversation_id = 1;
  string user_id         = 2;
}
message GetConversationResponse { ConversationProto conversation = 1; }

message ListConversationsRequest {
  string user_id = 1;
  int32  limit   = 2;
  int32  offset  = 3;
}
message ListConversationsResponse { repeated ConversationProto conversations = 1; }

message DeleteConversationRequest {
  string conversation_id = 1;
  string user_id         = 2;
}
message DeleteConversationResponse {}

message MarkConvReadRequest {
  string conversation_id = 1;
  string user_id         = 2;
}
message MarkConvReadResponse {}

// ── Message RPCs ───────────────────────────────────────────────────────────

message SendMessageRequest {
  string conversation_id = 1;
  string sender_id       = 2;
  string text            = 3;
  string media_url       = 4;
  string reply_to_id     = 5;
}
message SendMessageResponse { MessageProto message = 1; }

message EditMessageRequest {
  string message_id = 1;
  string sender_id  = 2;
  string text       = 3;
}
message EditMessageResponse { MessageProto message = 1; }

message DeleteMessageRequest {
  string message_id = 1;
  string sender_id  = 2;
}
message DeleteMessageResponse {}

message ListMessagesRequest {
  string conversation_id = 1;
  string user_id         = 2;
  int32  limit           = 3;
  int32  offset          = 4;
}
message ListMessagesResponse { repeated MessageProto messages = 1; }

message SearchMessagesRequest {
  string conversation_id = 1;
  string user_id         = 2;
  string query           = 3;
  int32  limit           = 4;
  int32  offset          = 5;
}
message SearchMessagesResponse { repeated MessageProto messages = 1; }

message PinMessageRequest {
  string message_id = 1;
  string user_id    = 2;
  bool   pinned     = 3;
}
message PinMessageResponse {}

// ── Reaction RPCs ──────────────────────────────────────────────────────────

message AddReactionRequest {
  string message_id = 1;
  string user_id    = 2;
  string emoji      = 3;
}
message AddReactionResponse {}

message RemoveReactionRequest {
  string message_id = 1;
  string user_id    = 2;
  string emoji      = 3;
}
message RemoveReactionResponse {}

// ── Group RPCs ─────────────────────────────────────────────────────────────

message CreateGroupChatRequest {
  string          creator_id = 1;
  string          name       = 2;
  string          avatar_url = 3;
  repeated string member_ids = 4;
}
message CreateGroupChatResponse { ConversationProto conversation = 1; }

message AddParticipantRequest {
  string conversation_id = 1;
  string requester_id    = 2;
  string user_id         = 3;
}
message AddParticipantResponse {}

message RemoveParticipantRequest {
  string conversation_id = 1;
  string requester_id    = 2;
  string user_id         = 3;
}
message RemoveParticipantResponse {}

message LeaveGroupRequest {
  string conversation_id = 1;
  string user_id         = 2;
}
message LeaveGroupResponse {}

message UpdateGroupInfoRequest {
  string conversation_id = 1;
  string requester_id    = 2;
  string name            = 3;
  string avatar_url      = 4;
}
message UpdateGroupInfoResponse {}

// ── Streaming messages ─────────────────────────────────────────────────────

message SubscribeRequest {
  string conversation_id = 1;
  string user_id         = 2;
}

message MessageEvent {
  string message_id      = 1;
  string conversation_id = 2;
  string sender_id       = 3;
  string text            = 4;
  string media_url       = 5;
  int64  created_at      = 6;
}

message TypingEvent {
  string conversation_id = 1;
  string user_id         = 2;
  bool   is_typing       = 3;
}
