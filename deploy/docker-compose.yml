services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── Backend services ───────────────────────────────────────────────────────

  user:
    build:
      context: ..
      dockerfile: backend/user/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      USER_GRPC_PORT: 50051
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
    volumes:
      - ../keys:/app/keys:ro
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:51051/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  post:
    build:
      context: ..
      dockerfile: backend/post/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      POST_GRPC_PORT: 50052
    ports:
      - "50052:50052"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:51052/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  chat:
    build:
      context: ..
      dockerfile: backend/chat/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      CHAT_GRPC_PORT: 50053
    ports:
      - "50053:50053"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:51053/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  story:
    build:
      context: ..
      dockerfile: backend/story/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      STORY_GRPC_PORT: 50054
    ports:
      - "50054:50054"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:51054/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  notification:
    build:
      context: ..
      dockerfile: backend/notification/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      NOTIFICATION_GRPC_PORT: 50055
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      APP_URL: "http://localhost:3000"
    ports:
      - "50055:50055"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:51055/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    environment:
      HTTP_PORT: 8080
      USER_GRPC_ADDR: user:50051
      POST_GRPC_ADDR: post:50052
      CHAT_GRPC_ADDR: chat:50053
      STORY_GRPC_ADDR: story:50054
      NOTIFICATION_GRPC_ADDR: notification:50055
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: social
      MINIO_PUBLIC_HOST: "${MINIO_PUBLIC_HOST:-localhost:9000}"
      MINIO_USE_SSL: "${MINIO_USE_SSL:-false}"
      ADMIN_EMAILS: "${ADMIN_EMAILS:-bekeshdastan@gmail.com}"
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-http://localhost:3000}"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      user:
        condition: service_healthy
      post:
        condition: service_healthy
      chat:
        condition: service_healthy
      story:
        condition: service_healthy
      notification:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

  # ── Monitoring ─────────────────────────────────────────────────────────────

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--housekeeping_interval=15s"
      - "--docker_only=true"
      - "--store_container_labels=true"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9091:9090"
    depends_on:
      - cadvisor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
  prometheus_data:
  grafana_data:
