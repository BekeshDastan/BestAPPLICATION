services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── Backend services ───────────────────────────────────────────────────────

  user:
    build:
      context: ..
      dockerfile: backend/user/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      USER_GRPC_PORT: 50051
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
    volumes:
      - ../keys:/app/keys:ro
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  post:
    build:
      context: ..
      dockerfile: backend/post/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      POST_GRPC_PORT: 50052
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  chat:
    build:
      context: ..
      dockerfile: backend/chat/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      CHAT_GRPC_PORT: 50053
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  story:
    build:
      context: ..
      dockerfile: backend/story/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      STORY_GRPC_PORT: 50054
    ports:
      - "50054:50054"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  notification:
    build:
      context: ..
      dockerfile: backend/notification/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: social
      POSTGRES_PASSWORD: social
      POSTGRES_SSLMODE: disable
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      NATS_STREAM: SOCIAL
      NOTIFICATION_GRPC_PORT: 50055
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
    ports:
      - "50055:50055"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    environment:
      HTTP_PORT: 8080
      USER_GRPC_ADDR: user:50051
      POST_GRPC_ADDR: post:50052
      CHAT_GRPC_ADDR: chat:50053
      STORY_GRPC_ADDR: story:50054
    ports:
      - "8080:8080"
    depends_on:
      - user
      - post
      - chat
      - story
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
